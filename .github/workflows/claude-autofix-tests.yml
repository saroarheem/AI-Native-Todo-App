name: Claude Auto-Fix Tests

# Runs the unit test suite on every pull request. If tests fail, a Claude-powered
# bot attempts a SAFE automatic fix and, when successful, pushes it to the PR branch.
#
# ┌───────────────────────────────────────────────────────────────────────────┐
# │ ACTION POLICY                                                               │
# ├───────────────────────────────────────────────────────────────────────────┤
# │ ✅ AUTOMATIC  — Applying a fix that touches ONLY test files (*.spec.ts),    │
# │                 verified green by re-running the suite, then committing and  │
# │                 pushing it to the PULL REQUEST branch (never to `main`).     │
# │                 The PR review + merge is still the human gate before it      │
# │                 lands anywhere protected.                                    │
# │                                                                             │
# │ 🛑 NEEDS HUMAN APPROVAL — Anything that would change non-test source files,  │
# │                 a suite that is still red after the bot's edits, an          │
# │                 ambiguous / flaky / environmental failure, or a fork PR.     │
# │                 In these cases the bot changes NOTHING and instead posts a   │
# │                 diagnosis + proposed fix as a PR comment for a human.        │
# └───────────────────────────────────────────────────────────────────────────┘
#
# The "test-files-only" and "suite must be green" invariants are enforced by the
# workflow steps below (not by trusting the model's self-report).

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write # to push the safe fix commit to the PR branch
  pull-requests: write # to post the result comment
  id-token: write # required by claude-code-action to request an OIDC token

jobs:
  autofix-tests:
    runs-on: ubuntu-latest
    # Only run for same-repo PRs. Fork PRs get a read-only token and no secrets,
    # so pushing a fix is impossible — those failures are left for a human.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          # Check out the PR's own branch (not the detached merge ref) so a fix
          # can be pushed back to it.
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        id: test
        continue-on-error: true
        run: npm test -- --watch=false

      - name: Claude attempts a safe fix
        if: steps.test.outcome == 'failure'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            The unit test suite for this repository is currently FAILING on a pull
            request. You are an automated test-fixing bot. Work carefully.

            Repository: ${{ github.repository }}
            PR number: ${{ github.event.pull_request.number }}

            ## Your job
            1. Run `npm test -- --watch=false` to see the failures.
            2. Diagnose the root cause of each failing test.
            3. Decide whether the fix is SAFE to apply automatically.

            ## What counts as a SAFE, automatic fix
            A fix is SAFE only if ALL of these hold:
              - It changes ONLY test files matching `*.spec.ts`. You must NOT edit
                anything under `src/` that is not a `*.spec.ts` file, and you must
                NOT edit build/config files.
              - It corrects a mistake in the TEST itself — e.g. a test asserting an
                outdated string/value that was deliberately changed in this PR, a
                wrong import path in a spec, a renamed symbol the spec still refers
                to by its old name, or an obviously incorrect expected value.
              - After your edit, `npm test -- --watch=false` passes cleanly.

            If a safe fix is possible, APPLY it by editing the `*.spec.ts` file(s),
            then re-run `npm test -- --watch=false` to confirm the suite is green.

            ## What is NOT safe (do NOT change any files)
              - The failure indicates the PRODUCTION code under `src/` is wrong, or
                the correct behavior is genuinely ambiguous. (The test may be
                correctly catching a real bug — a human must decide.)
              - The fix would require editing any non-test file.
              - The failure looks flaky, timing-based, or environmental.
              - More than a small, localized change is needed.
            In these cases, DO NOT edit, commit, push, or comment. Just report.

            ## Report (REQUIRED)
            Write a Markdown report to this exact path:
              ${{ runner.temp }}/autofix-report.md
            The VERY FIRST line of the file must be exactly one of:
              RESOLUTION: AUTOMATIC
              RESOLUTION: NEEDS_HUMAN_APPROVAL
            Then a blank line, then a short explanation:
              - Which test(s) failed and why.
              - For AUTOMATIC: exactly what you changed in which spec file(s).
              - For NEEDS_HUMAN_APPROVAL: your diagnosis and a concrete proposed
                fix (a small diff or clear instructions) for a human to apply.

            ## Hard rules
              - Do NOT run git commit, git push, or gh. The workflow handles
                committing, pushing, and commenting AFTER re-verifying your work.
              - Do NOT touch any file other than `*.spec.ts` files.
          claude_args: |
            --max-turns 25
            --allowedTools "Bash(npm test:*),Bash(npm run test:*),Bash(npx ng test:*),Bash(git diff:*),Bash(git status:*),Bash(git log:*),Read,Grep,Glob,Edit,Write"

      - name: Verify, then push safe fix or escalate
        if: steps.test.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          REPORT: ${{ runner.temp }}/autofix-report.md
        run: |
          set -euo pipefail

          # Ensure a report always exists, even if the Claude step failed.
          if [ ! -f "$REPORT" ]; then
            printf 'RESOLUTION: NEEDS_HUMAN_APPROVAL\n\nThe auto-fix bot did not produce a report. Tests are still failing; please investigate manually.\n' > "$REPORT"
          fi

          # Compose a comment: a marker banner followed by the bot's report body.
          comment() { printf '%s\n\n---\n\n%s\n' "$1" "$(cat "$REPORT")"; }

          # Stage everything (including any new files) so we can inspect the diff.
          git add -A
          CHANGED=$(git diff --cached --name-only || true)

          if [ -z "$CHANGED" ]; then
            echo "Bot proposed no file changes."
            gh pr comment "$PR" --body "$(comment '🛑 **[NEEDS HUMAN APPROVAL]** Tests are failing and the bot did not apply an automatic fix. See the diagnosis below.')"
            exit 0
          fi

          # SAFETY GATE (workflow-enforced): automatic fixes may touch test files only.
          UNSAFE=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              *.spec.ts) ;;
              *) UNSAFE=1; echo "Refusing to auto-apply: non-test file changed -> $f" ;;
            esac
          done <<< "$CHANGED"

          if [ "$UNSAFE" -eq 1 ]; then
            git reset --hard
            gh pr comment "$PR" --body "$(comment '🛑 **[NEEDS HUMAN APPROVAL]** A fix would require changing non-test source files, which the bot never does automatically. Nothing was pushed. Proposed diagnosis and fix below.')"
            exit 0
          fi

          # RE-VERIFY (workflow-enforced): the suite must actually be green now.
          if ! npm test -- --watch=false; then
            git reset --hard
            gh pr comment "$PR" --body "$(comment '🛑 **[NEEDS HUMAN APPROVAL]** The bot changed test files but the suite is still red, so nothing was pushed. Diagnosis below.')"
            exit 0
          fi

          # Test-files-only + verified green -> push automatically to the PR branch.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit \
            -m "test: auto-fix failing tests (bot)" \
            -m "Applied automatically by the Claude auto-fix bot. Only test files (*.spec.ts) were changed and the suite is green. See the PR comment for details." \
            -m "Co-Authored-By: Claude Opus 4.8 <noreply@anthropic.com>"
          git push origin "HEAD:${HEAD_REF}"
          SHA=$(git rev-parse --short HEAD)
          gh pr comment "$PR" --body "$(comment "✅ **[AUTOMATIC]** Fixed the failing tests by editing test files only, re-ran the suite to confirm it is green, and pushed \`${SHA}\` to this PR branch. Please review before merging.")"
